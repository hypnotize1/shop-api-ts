services:
  # 1. MongoDB service
  database:
    image: mongo:6.0
    platform: linux/amd64
    container_name: shop-mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Redis Cache Service
  cache:
    image: redis:8.8-alpine
    container_name: shop-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  # 3. NodeJS service
  api:
    build: .
    container_name: shop-backend
    ports:
      - "3000:3000"
    depends_on:
      - database
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./package.json
          target: /app/package.json

volumes:
  mongo-data:
